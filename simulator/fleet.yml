# Fleet configuration for local development and simulation.
#
# This file is the single source of truth for what stations, docks, and bikes
# exist locally. Both the seed script (seed_dev_data) and the station simulator
# read from this file so they stay in sync.
#
# Station behavior modes:
#   always_success  - every unlock attempt succeeds
#   always_fail     - every unlock attempt fails (use failure_reason to set why)
#   flaky           - succeeds most of the time, fails randomly (set fail_rate)
#   slow            - succeeds but takes longer than normal (use delay_sec)
#   timeout         - never responds (simulates station going offline)
#   silent_return   - unlocks succeed normally but BIKE_DOCKED is suppressed on return
#                     (simulates arrival sensor / connectivity failure at return time)
#                     Stale ride reconciliation detects and closes the ride via telemetry.
#
# User behavior modes:
#   commuter    - always rides the same route (origin → commuter_destination)
#   explorer    - docks at a random station each time
#   indecisive  - returns to the same station they left from
#   ghost       - high probability of never returning the bike
#   tourist     - long rides, always picks a random station

stations:
  - id: "S001"
    name: "Meskel Square"
    lat: 9.0107
    lng: 38.7615
    behavior: always_success
    docks:
      - index: 1
        bike_id: "B001"
      - index: 2
        bike_id: "B002"
      - index: 3
        bike_id: "B003"
      - index: 4
        bike_id: "B008"     # default bike for user +15550000004 (silent_return demo)

  - id: "S002"
    name: "Bole Medhanealem"
    lat: 8.9978
    lng: 38.7964
    behavior: flaky
    fail_rate: 0.3          # 30% chance of failure
    failure_reason: "LATCH_FAULT"
    docks:
      - index: 1
        bike_id: "B004"
      - index: 2
        bike_id: "B005"
      - index: 3
        bike_id: null
      - index: 4
        bike_id: null

  - id: "S003"
    name: "Mexico Square"
    lat: 9.0220
    lng: 38.7469
    behavior: always_fail
    failure_reason: "LATCH_FAULT"
    docks:
      - index: 1
        bike_id: "B006"
      - index: 2
        bike_id: null
      - index: 3
        bike_id: null
      - index: 4
        bike_id: null

  - id: "S004"
    name: "Piazza"
    lat: 9.0334
    lng: 38.7459
    behavior: timeout         # simulates station not responding
    docks:
      - index: 1
        bike_id: "B007"
      - index: 2
        bike_id: null
      - index: 3
        bike_id: null
      - index: 4
        bike_id: null

  - id: "S005"
    name: "Megenagna"
    lat: 9.0246
    lng: 38.8029
    behavior: silent_return   # unlocks succeed but BIKE_DOCKED is suppressed on return
    docks:                    # used to test stale ride reconciliation via telemetry
      - index: 1
        bike_id: null
      - index: 2
        bike_id: null
      - index: 3
        bike_id: null
      - index: 4
        bike_id: null

users:
  # Commuter: same route every day, S001 → S004, always returns the bike
  - phone: "+15550000001"
    behavior: commuter
    bike_id: "B001"                 # default bike for user simulator
    commuter_destination: "S004"
    ride_duration_range: [15, 30]   # seconds (reduce for faster local testing)
    no_return_rate: 0.0

  # Explorer: unpredictable — different station each time, occasionally forgets to dock
  - phone: "+15550000002"
    behavior: explorer
    bike_id: "B004"                 # default bike for user simulator (flaky station)
    ride_duration_range: [10, 25]
    no_return_rate: 0.15

  # Ghost: takes bikes and rarely brings them back
  - phone: "+15550000003"
    behavior: ghost
    bike_id: "B002"                 # default bike for user simulator
    ride_duration_range: [20, 40]
    no_return_rate: 0.8

  # Silent return demo: always returns to S005 (silent_return station).
  # BIKE_DOCKED is suppressed — stale ride reconciliation closes the ride via telemetry.
  - phone: "+15550000004"
    behavior: commuter
    bike_id: "B008"
    commuter_destination: "S005"
    ride_duration_range: [15, 30]
    no_return_rate: 0.0
